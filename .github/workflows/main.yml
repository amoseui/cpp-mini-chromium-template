name: actions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]

    defaults:
      run:
        shell: bash

    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python setup tools
      run: |
        pip install setuptools

    - uses: actions/cache@v4
      with:
        path: |
          .cipd/
          buildtools/
          third_party/googletest/src
          third_party/mini_chromium/src
        key: ${{ runner.os }}-DEPS-${{ hashFiles('DEPS') }}
        restore-keys: |
          ${{ runner.os }}-DEPS-

    - name: Set up PATH
      run: |
        echo "${{ github.workspace }}/depot_tools" >> "$GITHUB_PATH"

    - name: Sync
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        gclient sync

    - name: Build and run tests
      run: |
        gnargs=""
        ext=""
        if [ "$RUNNER_OS" = "Windows" ]; then
          # Use the runner's MSVC (cl.exe) instead of fetching a clang package.
          gnargs='--args=mini_chromium_is_clang=false'
          ext=".exe"
        fi
        gn gen out $gnargs
        autoninja -C out hello
        "./out/hello$ext"
        autoninja -C out hello_unittest
        "./out/hello_unittest$ext"
